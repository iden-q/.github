<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IdenQ — Quantum-Safe Security. Your crypto protected for life. And beyond.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050b1f"/>
      <stop offset="0.55" stop-color="#0a1230"/>
      <stop offset="1" stop-color="#101036"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#grid)"/>
  <circle cx="1040" cy="80" r="260" fill="url(#glowViolet)"/>
  <circle cx="180" cy="290" r="240" fill="url(#glowCyan)"/>

  <!-- lattice constellation, right side -->
  <g stroke="#67e8f9" stroke-opacity="0.35" stroke-width="1.2">
    <line x1="920" y1="90" x2="1030" y2="150"/>
    <line x1="1030" y1="150" x2="1150" y2="95"/>
    <line x1="1030" y1="150" x2="1090" y2="250"/>
    <line x1="920" y1="90" x2="960" y2="215"/>
    <line x1="960" y1="215" x2="1090" y2="250"/>
    <line x1="1150" y1="95" x2="1210" y2="200"/>
    <line x1="1090" y1="250" x2="1210" y2="200"/>
    <line x1="960" y1="215" x2="855" y2="270"/>
    <line x1="920" y1="90" x2="1150" y2="95"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="920" cy="90" r="5">
      <animate attributeName="opacity" values="1;0.35;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1030" cy="150" r="7" fill="#818cf8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="95" r="4.5">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="215" r="5.5" fill="#c084fc">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1090" cy="250" r="4.5">
      <animate attributeName="opacity" values="1;0.4;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1210" cy="200" r="4" fill="#818cf8">
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="855" cy="270" r="3.5">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- orbit rings, left accent -->
  <g transform="translate(120 120)" stroke="url(#accent)" fill="none" stroke-opacity="0.5">
    <ellipse rx="64" ry="24" stroke-width="1.4" transform="rotate(-24)"/>
    <ellipse rx="64" ry="24" stroke-width="1.4" transform="rotate(36)"/>
    <ellipse rx="64" ry="24" stroke-width="1.4" transform="rotate(96)"/>
    <circle r="7" fill="#22d3ee" stroke="none">
      <animate attributeName="r" values="7;9;7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wordmark -->
  <text x="230" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#f8fafc" letter-spacing="1">Iden<tspan fill="url(#accent)">Q</tspan></text>
  <text x="234" y="192" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#7dd3fc" letter-spacing="6">QUANTUM-SAFE SECURITY</text>
  <text x="234" y="232" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" fill="#cbd5e1" letter-spacing="0.5">Your crypto protected for life. And beyond.</text>

  <!-- data stream -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#475e86">
    <text x="234" y="285">$ hybrid-encrypt --classical aes-256 --pqc ml-kem-1024</text>
    <text x="234" y="306" fill="#38bdf8" opacity="0.85">✓ key encapsulated · quantum-resistant · zero-knowledge verified
      <animate attributeName="opacity" values="0;0;0.85;0.85" keyTimes="0;0.35;0.5;1" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="0" y="336" width="1280" height="4" fill="url(#accent)"/>
</svg>
