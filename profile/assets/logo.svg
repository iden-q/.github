<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IdenQ logo">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e2a5e"/>
      <stop offset="0.5" stop-color="#1e63b8"/>
      <stop offset="1" stop-color="#3aa0e6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="helix" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2ff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="344" height="344" rx="72" fill="url(#tile)"/>
  <rect x="8" y="8" width="344" height="344" rx="72" fill="url(#sheen)"/>
  <rect x="8.5" y="8.5" width="343" height="343" rx="71.5" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>

  <!-- IDEN -->
  <text x="52" y="212" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#f8fafc" letter-spacing="-2">IDEN</text>

  <!-- Q ring -->
  <g transform="translate(270 172)">
    <circle r="52" fill="none" stroke="#f8fafc" stroke-width="17"/>
    <rect x="18" y="30" width="17" height="46" rx="8" fill="#f8fafc" transform="rotate(-40 26 53)"/>

    <!-- DNA helix inside the Q -->
    <g stroke="url(#helix)" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M -20 -32 C 18 -14, -18 14, 20 32"/>
      <path d="M 20 -32 C -18 -14, 18 14, -20 32"/>
    </g>
    <g stroke="#bae6fd" stroke-width="3.5" stroke-linecap="round">
      <line x1="-14" y1="-24" x2="14" y2="-24"/>
      <line x1="-4" y1="-8" x2="4" y2="-8"/>
      <line x1="-4" y1="8" x2="4" y2="8"/>
      <line x1="-14" y1="24" x2="14" y2="24"/>
    </g>
  </g>
</svg>
